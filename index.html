<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UEFN AI Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>UEFN AI BUILDER</h1>
        <p>Génère ton code Verse pour Fortnite</p>
    </header>

    <main>
        <div class="chat-container">
            <div id="chat-display">
                <p><strong>IA :</strong> Salut ! Dis-moi ce que tu veux créer (ex: "un garde", "une zone de soin", "donner une arme").</p>
            </div>
            
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Tape ta demande ici...">
                <button onclick="askAI()">Envoyer</button>
            </div>
        </div>

        <section class="output">
            <pre id="code-display">// Le code Verse apparaîtra ici...</pre>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
